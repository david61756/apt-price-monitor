name: 과거 데이터 백필

on:
  workflow_dispatch:
    inputs:
      months:
        description: "이번 달 포함 과거 몇 개월치를 수집할지 (예: 24)"
        required: true
        default: "24"

permissions:
  contents: write

concurrency:
  group: apt-monitor
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 백필 실행 (알림 없음)
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: python monitor.py --backfill ${{ github.event.inputs.months }}

      - name: state.json·대시보드 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json docs/index.html
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: 과거 ${{ github.event.inputs.months }}개월 데이터 백필"
            git push || { git pull --rebase --autostash && git push; }
          fi
