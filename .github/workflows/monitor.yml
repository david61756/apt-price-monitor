name: 아파트 실거래가 모니터링

on:
  schedule:
    # KST 09:00 (UTC 00:00). 08:00 KST로 바꾸려면 '0 23 * * *'
    # GitHub Actions cron은 수분~수십분 지연될 수 있음
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: apt-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 모니터링 실행
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: state.json·대시보드 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json docs/index.html
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: 실거래 데이터 갱신 ($(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST'))"
            git push
          fi
