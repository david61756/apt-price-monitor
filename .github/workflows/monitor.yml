name: 아파트 실거래가 모니터링

on:
  schedule:
    # 매일 08:00 / 14:00 / 18:00 KST (각각 UTC 23:00 전날 / 05:00 / 09:00).
    # 로컬 Mac(launchd)이 같은 시각에 실거래+호가를 갱신하고 Discord로 알림.
    # GitHub Actions는 Mac이 꺼져 있을 때를 대비한 실거래 클라우드 백업(보통 수분~수십분 지연).
    - cron: "0 23 * * *"
    - cron: "0 5 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: apt-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 모니터링 실행
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: python monitor.py

      - name: state.json·대시보드 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json docs/index.html
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: 실거래 데이터 갱신 ($(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST'))"
            # 로컬 호가 커밋과의 경쟁(non-fast-forward) 대비 재시도
            git push || { git pull --rebase --autostash && git push; }
          fi
